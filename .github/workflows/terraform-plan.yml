name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - "*.tf"

permissions:
  id-token: write      # required for OIDC
  contents: read
  pull-requests: write # required to comment the plan on the PR

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"   # pin to the version you actually run locally

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

        # Optional: Run tflint and checkov for additional static analysis
        # tflint catches Azure-provider-specific mistakes (bad VM sizes, deprecated arguments, etc.)
      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Run tflint
        run: |
          tflint --init
          tflint

        # checkov scans for security misconfigurations (open NSGs, unencrypted disks, public storage
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: environments/dev
          framework: terraform

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -input=false \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="client_ip=${{ secrets.CLIENT_IP }}" \
            -var="WinSer1-VM-Dev_admin_password=${{ secrets.WIN_ADMIN_PASSWORD }}" \
            -var="pub_key=${{ secrets.SSH_PUB_KEY }}"
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1